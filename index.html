<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVING LEADER PLAYER - Smart E-Learning</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css)" rel="stylesheet">
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Space+Grotesk:wght@700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Space+Grotesk:wght@700&display=swap)');
        
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
        }

        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

        .view { display: none; height: 100%; width: 100%; flex-direction: column; overflow-y: auto; position: relative; z-index: 10; padding: 2rem;}
        .view.active { display: flex; animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #1d4ed8); color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.2s; cursor: pointer; border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        /* Drag & Drop Area */
        #drop-zone { border: 4px dashed rgba(59, 130, 246, 0.5); border-radius: 2rem; transition: all 0.3s; background: rgba(15, 23, 42, 0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; cursor: pointer; }
        #drop-zone.dragover { border-color: #10b981; background: rgba(16, 185, 129, 0.1); transform: scale(1.02); }

        /* Interattività e Formattazione */
        .interact-word { display: inline; padding: 0px 2px; border-radius: 4px; cursor: pointer; transition: all 0.2s; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
        .interact-word:hover { background: rgba(59, 130, 246, 0.4); color: white; }
        .interact-word[data-state="1"] { background: #10b981 !important; color: white !important; font-weight: 900 !important; box-shadow: 0 2px 10px rgba(16,185,129,0.5); text-shadow: none !important;}
        .interact-word[data-state="2"] { background: #ef4444 !important; color: white !important; font-weight: 900 !important; box-shadow: 0 2px 10px rgba(239,68,68,0.5); text-shadow: none !important;}
        .interact-word[data-state="3"] { text-decoration: line-through; opacity: 0.3; background: transparent !important; color: inherit; }
        
        .lesson-point { margin-bottom: 1.5rem; font-size: 1.8rem; line-height: 1.8; font-weight: 400; }
        .focus-word { color: #facc15; font-weight: 900; } 
        
        /* Stile specifico per le spiegazioni dei quiz (NON cliccabili) */
        .static-explanation .focus-word { color: #fcd34d; font-weight: 800; }

        /* Brainstorming Focus Mode */
        #brainstorm-focus { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding-top: 2rem; }
        .focused-main-word { font-size: 4rem; font-weight: 900; color: white; text-transform: uppercase; text-shadow: 0 0 30px rgba(251, 191, 36, 0.6); margin-bottom: 1rem; animation: pulse-glow 2.5s infinite alternate; text-align: center;}
        
        .related-words-container { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 15px; max-width: 1000px; width: 100%; margin-top: 2rem;}
        .related-card { 
            background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); border-radius: 1rem; 
            padding: 1.2rem 1.5rem; cursor: pointer; transition: all 0.3s; opacity: 0; transform: translateY(20px); 
            animation: slide-up 0.5s forwards; text-align: left;
            flex: 1 1 calc(33.333% - 15px); min-width: 250px; max-width: calc(50% - 15px);
        }
        .related-card:hover, .related-card.expanded { background: rgba(16, 185, 129, 0.4); border-color: #34d399; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .related-card .term { font-size: 1.3rem; font-weight: 700; color: #a7f3d0; }
        .related-card .desc { font-size: 0.95rem; color: #ecfdf5; margin-top: 0.5rem; border-top: 1px solid rgba(16, 185, 129, 0.3); padding-top: 0.5rem; display: none; line-height: 1.5;}
        .related-card.expanded .desc { display: block; animation: fade-in 0.3s; }
        
        @keyframes pulse-glow { 0% { text-shadow: 0 0 15px rgba(251, 191, 36, 0.4); transform: scale(1); } 100% { text-shadow: 0 0 40px rgba(251, 191, 36, 0.9); transform: scale(1.03); } }
        @keyframes slide-up { to { opacity: 1; transform: translateY(0); } }

        /* Overlay Lavagna LIM (Canvas) */
        #lim-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 50; }
        #lim-overlay.active { pointer-events: auto; cursor: crosshair; }

        /* Toolbar LIM (Basso a Sinistra) */
        #lim-toolbar {
            position: fixed; bottom: 30px; left: 30px; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 100px;
            display: flex; gap: 10px; z-index: 60; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .tool-btn {
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); color: white; font-size: 1.1rem; cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .tool-btn.active { background: #3b82f6; border-color: #93c5fd; box-shadow: 0 0 15px rgba(59,130,246,0.5); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        /* IMMAGINI QUIZ E LIGHTBOX */
        .quiz-img-thumb { width: 90px; height: 90px; object-fit: contain; border-radius: 0.5rem; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: all 0.2s; background: white; }
        .quiz-img-thumb:hover { transform: scale(1.15); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .analyzer-large-img { max-height: 250px; max-width: 100%; object-fit: contain; border-radius: 1rem; margin-bottom: 2rem; border: 4px solid rgba(255,255,255,0.1); background: white; cursor: pointer; transition: transform 0.2s; }
        .analyzer-large-img:hover { transform: scale(1.05); border-color: var(--accent); }
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; animation: fadeIn 0.2s; cursor: zoom-out; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); background: white; cursor: default; }
        .lightbox-close { position: absolute; top: 30px; right: 40px; color: white; font-size: 3rem; cursor: pointer; transition: transform 0.2s; }
        .lightbox-close:hover { transform: scale(1.2); color: #ef4444; }
    </style>

            <div>

                <i class="fa-solid fa-server mr-2"></i>Archivio Aule

            <button onclick="unloadLesson()" class="px-4 py-2 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white rounded-lg text-sm font-bold transition border border-red-500/30 hidden" id="btn-chiudi-lez">

    <!-- VIEW: UPLOAD (Drag & Drop) -->
    <!-- VIEW: HOME (Aule a tendina Accordion) -->

            <!-- BARRA DI RICERCA E CONTROLLI ACCORDION -->
            <div class="flex flex-col md:flex-row gap-4 mb-8">

                    <p class="text-xs font-black text-blue-400 uppercase tracking-widest mb-3 flex items-center"><i class="fa-solid fa-bullseye text-lg mr-2"></i> Contesto Operativo e Pericoli</p>

        <div class="flex h-full w-full">
            
            <!-- Sidebar Sinistra: GUIDA DOCENTE (Focus Schemato) -->

                <button onclick="navTo('topics')" class="text-slate-400 hover:text-white mb-8 text-left w-fit bg-slate-800 px-4 py-2 rounded-full border border-slate-700"><i class="fa-solid fa-arrow-left mr-2"></i>Indice Argomenti</button>
                <div id="dyn-topic-img-container" class="mb-6"></div>
                <div id="dyn-sidebar-content"></div>
            </div>
            
            <!-- Area Principale Destra: SLIDE LEZIONE -->
            <div id="dyn-scroll-area" class="w-3/4 p-10 flex flex-col h-full overflow-y-auto relative bg-[#0f172a] scroll-smooth">
                <div id="dyn-main-content" class="flex-grow max-w-5xl mx-auto w-full"></div>
                <div id="dyn-footer" class="mt-8 flex justify-end items-center border-t border-slate-800 pt-6 max-w-5xl mx-auto w-full pb-20"></div>
            </div>

        </div>

    <!-- VIEW: BRAINSTORMING (Lista in ordine script, grande) -->
    <div id="view-brainstorm" class="view">
        <div class="flex justify-between items-center mb-6 px-8 max-w-6xl mx-auto w-full">
            <button onclick="navTo('topics')" class="text-slate-400 hover:text-white bg-slate-800 px-4 py-2 rounded-full border border-slate-700"><i class="fa-solid fa-arrow-left mr-2"></i>Indietro</button>
            <h2 id="bs-title" class="text-3xl font-bold text-yellow-400">Mappa Mentale</h2>
            <button id="btn-brainstorm-quiz" onclick="launchAnalyzerFromBrainstorm()" class="btn-primary"><i class="fa-solid fa-microscope mr-2"></i>Quiz Collegati</button>
        </div>
        
        <div class="max-w-6xl mx-auto w-full flex-grow flex flex-col relative mb-8 overflow-hidden">
            <!-- VISTA 1: Elenco in ordine, testi grandi -->
            <div id="brainstorm-canvas" class="flex flex-col gap-4 w-full h-full overflow-y-auto pr-4 pb-20">
                <!-- Generato da JS -->
            </div>
            
            <!-- VISTA 2: Focus sul singolo concetto -->
            <div id="brainstorm-focus" class="glass-panel w-full">
                <button onclick="resetBrainstormFocus()" class="absolute top-6 left-6 text-slate-400 hover:text-white bg-slate-800 p-3 rounded-full flex items-center justify-center w-12 h-12 transition-all hover:bg-slate-700 hover:scale-110 shadow-lg border border-slate-600"><i class="fa-solid fa-arrow-left text-xl"></i></button>
                <div id="focus-main-word" class="focused-main-word mt-8 text-yellow-400"></div>
                <div id="focus-main-desc" class="text-slate-300 text-3xl mb-8 text-center max-w-4xl italic bg-slate-900/50 p-6 rounded-xl border border-slate-700"></div>

            </div>

            <button onclick="navTo('topics')" class="text-slate-400 hover:text-white bg-slate-800 px-4 py-2 rounded-full border border-slate-700"><i class="fa-solid fa-arrow-left mr-2"></i>Indietro</button>
            <h2 class="text-2xl font-bold text-green-400"><i class="fa-solid fa-chalkboard mr-2"></i>Lavagna Interattiva</h2>

            <div class="w-full flex justify-between items-center mb-12 text-sm font-bold uppercase tracking-widest text-slate-400 border-b border-slate-700 pb-4">

                    <span class="mr-4">Esito Ministeriale:</span>
                    <button id="az-esito-btn" onclick="revealResultAndExplanation()" class="px-6 py-2 text-xl rounded shadow-lg bg-slate-700 text-white font-black hover:bg-slate-600 transition border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">MOSTRA</button>

            <div id="az-explanation" class="mt-4 p-8 bg-blue-900/20 border border-blue-500/30 rounded-xl text-2xl text-blue-200 hidden w-full text-left shadow-inner flex items-start static-explanation"></div>

    <canvas id="lim-canvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></canvas>

    <!-- TOOLBAR LIM -->

        <button class="tool-btn active" id="tool-mouse" onclick="setTool('mouse')" title="Puntatore (Interagisci col Testo)"><i class="fa-solid fa-arrow-pointer"></i></button>
        <div class="w-px h-6 bg-slate-600 my-auto"></div>
        <button class="tool-btn" id="tool-pen" onclick="setTool('pen')" title="Pennarello Libero"><i class="fa-solid fa-pen"></i></button>
        <button class="tool-btn hover:bg-red-500" onclick="clearCanvas()" title="Cancella Disegni Lavagna"><i class="fa-solid fa-eraser"></i></button>
    </div>

<script>
    /* ==========================================================================
       STATO DELL'APPLICAZIONE E VARIABILI GLOBALI
    ========================================================================== */
    let currentLessonObj = null; 
    let allAulasExpanded = false;
    
    let currentState = {
        activeTopic: null,
        activeBlockIdx: 0,
        activeKeywordObj: null,
        analyzer: { pool: [], currentIdx: 0 }
    };

    let currentBrainstormContext = {
        title: "",
        keywords: [],
        quizzes: []
    };

    // Chiude parole interattive cliccando nel vuoto
    document.addEventListener('click', function(e) {
        if (e.target.closest('.interact-word') || e.target.closest('button') || e.target.closest('.tool-btn') || e.target.closest('.related-card') || e.target.closest('.brain-word')) {
            return;
        }
        document.querySelectorAll('.interact-word[data-state]').forEach(el => {
            el.setAttribute('data-state', '0');
        });
    });

    function navTo(viewId) {
        document.querySelectorAll('.view').forEach(el => { el.classList.remove('active'); el.scrollTop = 0; });
        document.getElementById(`view-${viewId}`).classList.add('active');
        
        if(viewId === 'upload') {
            document.getElementById('file-input').value = ""; // Reset file input
        }
        
        if(viewId === 'home') {
            const searchBar = document.getElementById('search-db');
            if (searchBar) searchBar.value = '';
            renderAulas();
        }
        
        // Gestione visibilità Toolbar LIM
        const limToolbar = document.getElementById('lim-toolbar');
        if(viewId === 'lezione' || viewId === 'analyzer') { 
            limToolbar.classList.remove('hidden'); 
        } else { 
            limToolbar.classList.add('hidden'); 
            setTool('mouse'); 
            clearCanvas(); 
        }
    }

    function unloadLesson() {
        currentLessonObj = null;
        document.getElementById('nav-icon').className = "fa-solid fa-folder-open text-2xl text-white";
        document.getElementById('nav-subtitle').innerText = "Smart E-Learning System";
        document.getElementById('nav-divider').classList.add('hidden');
        document.getElementById('btn-chiudi-lez').classList.add('hidden');
        navTo('upload');
    }

    /* ==========================================================================
       RENDER HOME (Accordion Aule -> Lezioni) E RICERCA PROFONDA
    ========================================================================== */
    function deepSearchLesson(lesson, query) {
        if (!query) return true;
        const q = query.toLowerCase().trim();
        
        if (lesson.title && lesson.title.toLowerCase().includes(q)) return true;
        if (lesson.description && lesson.description.toLowerCase().includes(q)) return true;
        
        if (lesson.topics) {
            for (let topic of lesson.topics) {
                if (topic.title && topic.title.toLowerCase().includes(q)) return true;
                
                if (topic.keywords) {
                    for (let kw of topic.keywords) {
                        if (kw.term && kw.term.toLowerCase().includes(q)) return true;
                        if (kw.desc && kw.desc.toLowerCase().includes(q)) return true;
                        if (kw.related) {
                            for (let rel of kw.related) {
                                if (rel.term && rel.term.toLowerCase().includes(q)) return true;
                                if (rel.desc && rel.desc.toLowerCase().includes(q)) return true;
                            }
                        }
                    }
                }
                
                if (topic.blocks) {
                    for (let block of topic.blocks) {
                        if (block.title && block.title.toLowerCase().includes(q)) return true;
                        if (block.content) {
                            for (let c of block.content) {
                                if (c.toLowerCase().includes(q)) return true;
                            }
                        }
                        if (block.quizzes) {
                            for (let quiz of block.quizzes) {
                                if (quiz.t && quiz.t.toLowerCase().includes(q)) return true;
                                if (quiz.r && quiz.r.toLowerCase().includes(q)) return true;
                            }
                        }
                        if (block.notes) {
                            if (block.notes.explain) {
                                for (let e of block.notes.explain) if (e.toLowerCase().includes(q)) return true;
                            }
                            if (block.notes.focus) {
                                for (let f of block.notes.focus) if (f.toLowerCase().includes(q)) return true;
                            }
                        }
                    }
                }
                
                if (topic.summary) {
                    if (topic.summary.points) {
                        for (let p of topic.summary.points) if (p.toLowerCase().includes(q)) return true;
                    }
                    if (topic.summary.exitTicket && topic.summary.exitTicket.toLowerCase().includes(q)) return true;
                    if (topic.summary.nextLesson && topic.summary.nextLesson.toLowerCase().includes(q)) return true;
                }
            }
        }
        return false;
    }

    function renderAulas(searchQuery = '') {
        const container = document.getElementById('aulas-container');
        container.innerHTML = '';
        
        const q = searchQuery.toLowerCase().trim();
        const isSearching = q.length > 0;
        const forceExpand = isSearching ? true : allAulasExpanded;
        let resultsFound = false;

        db.aulas.forEach((aula, aIdx) => {
            let aulaMatchesTitle = aula.title.toLowerCase().includes(q);
            let filteredLessons = aula.lessons.filter(lesson => {
                return aulaMatchesTitle || deepSearchLesson(lesson, q);
            });

            if (isSearching && filteredLessons.length === 0) return;
            resultsFound = true;

            const aulaDiv = document.createElement('div');
            aulaDiv.className = "mb-4 glass-panel overflow-hidden transition-all";
            
            const gridClassHidden = forceExpand ? "" : "hidden";
            const iconClassToggle = forceExpand ? "fa-chevron-up" : "fa-chevron-down";
            
            // Header Accordion
            const header = document.createElement('div');
            header.className = "p-6 cursor-pointer flex justify-between items-center hover:bg-slate-800/50 transition-colors";
            header.onclick = () => {
                const grid = document.getElementById(`grid-aula-${aIdx}`);
                const icon = document.getElementById(`icon-aula-${aIdx}`);
                grid.classList.toggle('hidden');
                icon.classList.toggle('fa-chevron-down');
                icon.classList.toggle('fa-chevron-up');
            };
            
            header.innerHTML = `
                <h3 class="text-2xl font-bold text-emerald-400 uppercase tracking-widest flex items-center">
                    <i class="fa-solid fa-school mr-4"></i>${aula.title} <span class="text-sm text-slate-500 ml-4 font-normal tracking-normal lowercase">(${filteredLessons.length} lezioni)</span>
                </h3>
                <i id="icon-aula-${aIdx}" class="fa-solid ${iconClassToggle} text-slate-400 text-xl transition-transform"></i>
            `;
            
            // Grid Lezioni
            const grid = document.createElement('div');
            grid.id = `grid-aula-${aIdx}`;
            grid.className = `grid grid-cols-1 lg:grid-cols-2 gap-4 p-6 pt-0 border-t border-slate-700/50 ${gridClassHidden}`;
            
            filteredLessons.forEach(lesson => {
                let totalMin = 0;
                let totalQuiz = 0;
                lesson.topics.forEach(t => {
                    if(t.blocks){
                        t.blocks.forEach(b => {
                            if(b.time) totalMin += parseInt(b.time.replace(/\D/g, '')) || 0;
                            if(b.quizzes) totalQuiz += b.quizzes.length;
                        });
                    }
                });

                const card = document.createElement('div');
                card.className = "bg-slate-800/50 p-6 rounded-xl hover:border-blue-500 cursor-pointer transition shadow-lg group border border-slate-700 mt-4 relative";
                card.onclick = () => openLesson(aula.id, lesson.id);
                
                let matchBadge = '';
                if (isSearching && !lesson.title.toLowerCase().includes(q) && !aulaMatchesTitle) {
                    matchBadge = `<div class="absolute top-4 right-4 text-[10px] uppercase tracking-widest text-emerald-400 font-bold bg-emerald-900/30 px-2 py-1 rounded border border-emerald-500/30"><i class="fa-solid fa-magnifying-glass mr-1"></i> Trovato nel testo</div>`;
                }

                card.innerHTML = `
                    ${matchBadge}
                    <div class="flex items-center mb-3 pr-16">
                        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mr-4 group-hover:scale-110 transition shadow-lg shrink-0">
                            <i class="fa-solid fa-book text-xl text-white"></i>
                        </div>
                        <h4 class="font-bold text-white text-xl leading-tight">${lesson.title}</h4>
                    </div>
                    <div class="flex flex-wrap gap-3 text-sm text-slate-400 mt-4 font-medium">
                        <span class="bg-slate-900 px-3 py-1 rounded-full border border-slate-700"><i class="fa-solid fa-list mr-1 text-blue-400"></i> ${lesson.topics.length} Argomenti</span>
                        <span class="bg-slate-900 px-3 py-1 rounded-full border border-slate-700"><i class="fa-regular fa-clock mr-1 text-yellow-400"></i> ~${totalMin} min</span>
                        <span class="bg-slate-900 px-3 py-1 rounded-full border border-slate-700"><i class="fa-solid fa-database mr-1 text-emerald-400"></i> ${totalQuiz} Quiz</span>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            aulaDiv.appendChild(header);
            aulaDiv.appendChild(grid);
            container.appendChild(aulaDiv);
        });

        if (isSearching && !resultsFound) {
            container.innerHTML = `
                <div class="text-center py-16 bg-slate-800/30 rounded-2xl border border-slate-700">
                    <i class="fa-solid fa-magnifying-glass text-5xl text-slate-500 mb-4"></i>
                    <h3 class="text-2xl font-bold text-white mb-2">Nessun risultato trovato</h3>
                    <p class="text-slate-400">La ricerca non ha prodotto risultati in nessun modulo, testo o quiz.</p>
                </div>
            `;
        }
    }

    function toggleAllAulas() {
        allAulasExpanded = !allAulasExpanded;
        const btn = document.getElementById('btn-toggle-aulas');
        
        if (allAulasExpanded) {
            btn.innerHTML = '<i class="fa-solid fa-compress mr-2"></i> <span>Chiudi Tutte</span>';
        } else {
            btn.innerHTML = '<i class="fa-solid fa-expand mr-2"></i> <span>Espandi Tutte</span>';
        }
        
        const currentQuery = document.getElementById('search-db') ? document.getElementById('search-db').value : '';
        renderAulas(currentQuery);
    }

    function openLesson(aulaId, lessonId) {
