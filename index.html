<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Leader Studio - Export PDF & CSV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        /* Stili per l'interfaccia Web (Dark Mode) */
        .app-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .glass-panel { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 1.5rem; }
        
        .fase-title { color: #38bdf8; font-weight: 800; font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.5rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; text-transform: uppercase; }
        .pagina-row { display: flex; align-items: baseline; margin-bottom: 0.5rem; font-size: 1.05rem; line-height: 1.4; }
        .pagina-badge { background: #0284c7; color: white; padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-weight: bold; font-size: 0.85rem; margin-right: 0.75rem; white-space: nowrap; }
        .pagina-text { color: #e2e8f0; }
        .pagina-trap { color: #f87171; font-weight: 600; }

        /* Restyling per le Matrici a Radice Lunga */
        .matrice-title { color: #fbbf24; font-weight: 800; font-size: 1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; line-height: 1.4; border-left: 3px solid #fbbf24; padding-left: 10px;}
        .matrice-row { display: flex; align-items: flex-start; margin-bottom: 0.35rem; padding-left: 1rem; font-size: 1.05rem; color: #cbd5e1; font-style: italic;}
        .v-badge { color: #10b981; font-weight: bold; margin-left: 0.5rem; font-style: normal; }
        .f-badge { color: #ef4444; font-weight: bold; margin-left: 0.5rem; font-style: normal; }

        /* --- STILI SPECIFICI PER ESPORTAZIONE PDF (Stampa) --- */
        @media print {
            body { background-color: white !important; color: black !important; }
            .no-print { display: none !important; }
            
            #mappa-render { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .glass-panel { border: none !important; padding: 0 !important; background: transparent !important; }
            
            .fase-title { color: black !important; border-bottom: 2px solid black !important; font-size: 14pt !important; margin-top: 15pt !important; page-break-after: avoid; }
            .pagina-row { margin-bottom: 8pt !important; font-size: 11pt !important; page-break-inside: avoid; }
            .pagina-badge { background: transparent !important; color: black !important; border: 1px solid black !important; }
            .pagina-text { color: black !important; }
            .pagina-trap { color: black !important; font-weight: bold !important; text-decoration: underline; }
            
            /* Nasconde la sezione matrici durante la stampa della mappa */
            #matrice-container { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="app-container no-print">
        <div class="flex items-center gap-4 mb-8 border-b border-slate-800 pb-6">
            <div class="bg-blue-600 p-4 rounded-xl shadow-lg">
                <i class="fa-solid fa-microchip text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold text-white m-0 tracking-tight">Driving Leader Studio</h1>
                <p class="text-slate-400 font-medium">Generatore Mappe e Matrici CSV (Radici Profonde)</p>
            </div>
        </div>

        <!-- AREA INPUT -->
        <div class="glass-panel mb-8 shadow-xl">
            <h2 class="text-xl font-bold mb-3 flex items-center text-slate-200"><i class="fa-solid fa-paste mr-2 text-blue-400"></i> Incolla l'output dell'IA</h2>
            <textarea id="raw-input" class="w-full bg-slate-900 border border-slate-700 text-slate-300 p-4 rounded-lg focus:outline-none focus:border-blue-500 font-mono text-sm h-40 mb-4" placeholder="Incolla qui tutto il testo contenente === MAPPA TECNICA === e === MATRICE QUIZ ==="></textarea>
            <button onclick="processData()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition w-full shadow-lg text-lg">
                <i class="fa-solid fa-gears mr-2"></i> Elabora Dati
            </button>
        </div>

        <!-- AREA RISULTATI (Nascosta all'avvio) -->
        <div id="results-area" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- COLONNA MAPPA TECNICA -->
            <div id="mappa-container" class="glass-panel flex flex-col h-[600px]">
                <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-4 shrink-0">
                    <h2 class="text-xl font-bold text-blue-400"><i class="fa-solid fa-map mr-2"></i> Mappa Tecnica</h2>
                    <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded font-bold text-sm transition border border-slate-600">
                        <i class="fa-solid fa-file-pdf mr-2 text-red-400"></i> Crea PDF
                    </button>
                </div>
                <div id="mappa-render" class="overflow-y-auto flex-grow pr-2">
                    <!-- HTML Generato qui -->
                </div>
            </div>

            <!-- COLONNA MATRICE QUIZ -->
            <div id="matrice-container" class="glass-panel flex flex-col h-[600px]">
                <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-4 shrink-0">
                    <h2 class="text-xl font-bold text-emerald-400"><i class="fa-solid fa-code-branch mr-2"></i> Radici Quiz</h2>
                    <button onclick="exportCSV()" class="bg-emerald-700 hover:bg-emerald-600 text-white px-4 py-2 rounded font-bold text-sm transition shadow">
                        <i class="fa-solid fa-file-csv mr-2 text-white"></i> Scarica CSV
                    </button>
                </div>
                <div id="matrice-render" class="overflow-y-auto flex-grow pr-2">
                    <!-- HTML Generato qui -->
                </div>
            </div>

        </div>
    </div>

<script>
    let csvDataArray = []; // Conterrà i dati pronti per il CSV

    function processData() {
        const rawText = document.getElementById('raw-input').value;
        if (!rawText.includes('=== MAPPA TECNICA ===') || !rawText.includes('=== MATRICE QUIZ ===')) {
            alert("Attenzione: Il testo incollato non contiene i delimitatori necessari (=== MAPPA TECNICA === e === MATRICE QUIZ ===).");
            return;
        }

        // Dividi le sezioni
        const parts = rawText.split('=== MATRICE QUIZ ===');
        const mappaRaw = parts[0].replace('=== MAPPA TECNICA ===', '').trim();
        const matriceRaw = parts[1].trim();

        renderMappa(mappaRaw);
        renderMatrice(matriceRaw);

        document.getElementById('results-area').classList.remove('hidden');
    }

    // --- RENDER MAPPA TECNICA ---
    function renderMappa(text) {
        const lines = text.split('\n');
        let html = '';
        
        lines.forEach(line => {
            let l = line.trim();
            if(!l) return;

            // Rileva le Fasi
            if (l.includes('FASE')) {
                let title = l.replace(/[\*🛑\#]/g, '').trim();
                html += `<div class="fase-title">${title}</div>`;
            } 
            // Rileva le Pagine
            else if (l.includes('PAGINA')) {
                l = l.replace(/^\*\s*/, '');
                
                let pageMatch = l.match(/PAGINA\s*\d+:/i);
                let badgeText = pageMatch ? pageMatch[0].replace(':', '') : "PAGINA";
                
                let remaining = pageMatch ? l.substring(l.indexOf(':') + 1) : l;
                let trapSplit = remaining.split('⚠️');
                let mainText = trapSplit[0].trim();
                let trapText = trapSplit[1] ? "⚠️ " + trapSplit[1].trim() : "";

                mainText = mainText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                trapText = trapText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                html += `
                    <div class="pagina-row">
                        <span class="pagina-badge">${badgeText}</span>
                        <span class="pagina-text">${mainText} <span class="pagina-trap">${trapText}</span></span>
                    </div>
                `;
            }
        });

        document.getElementById('mappa-render').innerHTML = html;
    }

    // --- RENDER MATRICE (RADICI PROFONDE) E PREPARAZIONE CSV ---
    function renderMatrice(text) {
        const lines = text.split('\n');
        let html = '';
        csvDataArray = []; // Resetta i dati CSV
        csvDataArray.push(["Radice Base", "Continuazione", "Frase Unita Completa", "Esito (V/F)"]); // Intestazioni CSV aggiornate

        let currentMatriceVisual = ""; // Per l'HTML
        let currentMatriceClean = "";  // Per il CSV (senza i puntini)

        lines.forEach(line => {
            let l = line.trim();
            if(!l) return;

            // Se la riga NON inizia con un trattino, è la Radice (Matrice Base)
            if (!l.startsWith('-')) {
                // Mantiene i puntini visivamente per l'HTML
                currentMatriceVisual = l.replace(/[\[\]\*\#]/g, '').trim();
                
                // Rimuove i puntini finali per il foglio Excel CSV
                currentMatriceClean = currentMatriceVisual.replace(/\.\.\.$/, '').trim();
                
                html += `<div class="matrice-title">${currentMatriceVisual}</div>`;
            } 
            // Se inizia con un trattino, è la Diramazione (Continuazione)
            else {
                let isVero = l.toUpperCase().includes('(V)');
                let badgeHtml = isVero ? '<span class="v-badge">(V)</span>' : '<span class="f-badge">(F)</span>';
                
                // Mantiene i puntini iniziali se presenti per l'estetica a schermo
                let testoVisual = l.replace(/^-/, '').replace(/\([VF]\)/i, '').trim();
                
                // Rimuove i puntini e gli spazi extra per il CSV
                let testoClean = testoVisual.replace(/^\.\.\./, '').trim();
                
                // Genera la frase completa pulita unendo Radice e Diramazione
                let fraseCompleta = (currentMatriceClean + " " + testoClean).replace(/\s+/g, ' ');
                
                html += `<div class="matrice-row"><i class="fa-solid fa-arrow-turn-up fa-rotate-90 text-slate-600 mr-2 mt-1 text-sm"></i> ${testoVisual} ${badgeHtml}</div>`;
                
                let esitoClean = isVero ? "V" : "F";
                
                // Aggiunge al CSV: Radice, Diramazione, FRASE INTERA, Esito
                csvDataArray.push([currentMatriceClean, testoClean, fraseCompleta, esitoClean]);
            }
        });

        document.getElementById('matrice-render').innerHTML = html;
    }

    // --- ESPORTAZIONE CSV ---
    function exportCSV() {
        if(csvDataArray.length <= 1) {
            alert("Nessun dato matrice disponibile per l'esportazione.");
            return;
        }

        let csvContent = "";
        csvDataArray.forEach(row => {
            let rowStr = row.map(item => {
                let str = String(item).replace(/"/g, '""');
                return `"${str}"`;
            }).join(",");
            csvContent += rowStr + "\r\n";
        });

        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Analisi_Matrici_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
