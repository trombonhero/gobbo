<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Leader Studio - Formazione Iniziale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap');
        
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
        }

        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

        #app-ui { display: flex; flex-direction: column; height: 100%; width: 100%; }

        .view-section { display: none; height: 100%; width: 100%; flex-direction: column; padding: 2rem; overflow-y: auto; }
        .view-section.active { display: flex; animation: fade-in 0.4s ease-out forwards; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #1d4ed8); color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-export { background: linear-gradient(135deg, #10b981, #059669); color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-export:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4); }

        /* Focus Mode Panels */
        .maximized-panel {
            position: fixed !important; top: 2rem !important; left: 2rem !important; right: 2rem !important; bottom: 2rem !important;
            height: calc(100vh - 4rem) !important; z-index: 100 !important;
            background-color: #0f172a !important; border: 2px solid #3b82f6 !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8) !important;
        }
        #maximize-backdrop {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 90;
        }
        #maximize-backdrop.active { display: block; animation: fadeIn 0.2s; }
        body.panel-maximized .view-section.active { z-index: 9999 !important; position: relative; }

        /* Stili Mappa Tecnica */
        .incipit-globale { background: rgba(251, 191, 36, 0.1); border-left: 4px solid #fbbf24; padding: 1.25rem; margin-bottom: 2rem; border-radius: 0.5rem; color: #fde68a; font-style: italic; line-height: 1.6; font-size: 1.05rem;}
        .incipit-globale strong { color: #fbbf24; font-size: 1.15rem; font-weight: 900; text-transform: uppercase; font-style: normal; display: block; margin-bottom: 0.5rem;}
        .fase-title { color: #38bdf8; font-weight: 900; font-size: 1.3rem; margin-top: 1.5rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;}
        .incipit-fase { color: #94a3b8; font-style: italic; margin-bottom: 1.5rem; padding-left: 1rem; border-left: 2px solid #475569; font-size: 0.95rem; line-height: 1.4; }
        .pagina-row { display: flex; align-items: flex-start; margin-bottom: 1.2rem; font-size: 1.05rem; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.8rem;}
        .pagina-badge { background: #0284c7; color: white; padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-weight: bold; font-size: 0.85rem; margin-right: 1rem; white-space: nowrap; margin-top: 2px;}
        .pagina-text { color: #e2e8f0; flex-grow: 1; }
        .pagina-trap { color: #f87171; font-weight: 600; display: block; margin-top: 0.4rem; background: rgba(239,68,68,0.1); padding: 0.4rem 0.6rem; border-radius: 0.25rem; border-left: 3px solid #ef4444;}

        /* Stili Matrice Quiz */
        .matrice-title { color: #fbbf24; font-weight: 800; font-size: 1.05rem; margin-top: 1.5rem; margin-bottom: 0.5rem; line-height: 1.4; border-left: 3px solid #fbbf24; padding-left: 10px; background: transparent;}
        .matrice-row { display: flex; align-items: flex-start; margin-bottom: 0.75rem; padding-left: 1rem; font-size: 1.05rem; color: #f8fafc; }
        .v-badge { color: #10b981; font-weight: 900; margin-left: 0.5rem; font-style: normal; }
        .f-badge { color: #ef4444; font-weight: 900; margin-left: 0.5rem; font-style: normal; }
        .matrice-exp { display: block; font-size: 0.9rem; color: #94a3b8; margin-top: 0.2rem; font-style: italic; }

        /* Area Stampa */
        #print-area { display: none; background: white; color: black; padding: 2cm; min-height: 100vh; }
        @media print {
            body { background: white !important; color: black !important; font-size: 10pt !important; height: auto !important; overflow: visible !important;}
            #app-ui, #maximize-backdrop { display: none !important; }
            #print-area { display: block !important; padding: 0 !important; font-family: 'Segoe UI', Arial, sans-serif; }
            @page { margin: 0.8cm; }
            
            .print-header-container { border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 12px; }
            .print-header-aula { font-size: 9pt; color: #555; margin: 0 0 2px 0; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
            .print-header-ob { font-size: 16pt; margin: 0 0 2px 0; font-weight: 900; line-height: 1.1; color: #000; }
            .print-header-arg { font-size: 12pt; color: #444; margin: 0; font-style: italic; font-weight: normal; }

            .incipit-globale { background: #fef9c3 !important; border-left: 4px solid #d97706 !important; padding: 8px 12px !important; margin-bottom: 12px !important; border-radius: 4px; font-style: italic; color: #000 !important; font-size: 9.5pt !important; line-height: 1.3 !important;}
            .incipit-globale strong { color: #b45309 !important; font-size: 10.5pt !important; margin-bottom: 2px !important; display: block; font-style: normal; }
            
            .fase-title { color: black !important; border-bottom: 1.5px solid black !important; font-size: 13pt !important; margin-top: 14pt !important; padding-bottom: 2pt !important; margin-bottom: 4pt !important; page-break-after: avoid; font-weight: 900 !important; text-transform: uppercase; }
            .incipit-fase { color: #444 !important; font-style: italic; margin-bottom: 8pt !important; padding-left: 8px !important; border-left: 2px solid #888 !important; font-size: 9pt !important; line-height: 1.2 !important; page-break-after: avoid; }
            
            .pagina-row { display: flex; align-items: flex-start; margin-bottom: 6pt !important; font-size: 9.5pt !important; line-height: 1.25 !important; page-break-inside: avoid; border-bottom: 1px solid #eee; padding-bottom: 5px;}
            .pagina-badge { border: 1px solid black !important; padding: 1px 4px; font-weight: bold; margin-right: 8px; white-space: nowrap; color: black !important; background: transparent !important; font-size: 8pt !important; margin-top: 1px; }
            .pagina-text { color: black !important; flex-grow: 1; }
            .pagina-trap { display: block; margin-top: 2px; font-weight: bold !important; color: #b91c1c !important; padding-left: 6px; border-left: 2px solid #b91c1c; font-size: 9pt !important; background: transparent !important; padding-top: 0; padding-bottom: 0;}
            
            .matrice-title { color: black !important; font-weight: 800 !important; font-size: 10pt !important; margin-top: 10pt !important; margin-bottom: 3pt !important; line-height: 1.2 !important; border-left: 2px solid black !important; padding-left: 6px; background: transparent !important; page-break-after: avoid; }
            .matrice-row { display: flex; align-items: flex-start; margin-bottom: 3pt !important; padding-left: 8px; font-size: 9pt !important; color: black !important; line-height: 1.2 !important; page-break-inside: avoid; font-style: normal !important; }
            .v-badge { color: #10b981 !important; font-weight: bold; margin-left: 4px; font-style: normal; font-size: 8pt !important;}
            .f-badge { color: #ef4444 !important; font-weight: bold; margin-left: 4px; font-style: normal; font-size: 8pt !important;}
            .matrice-exp { display: block; font-size: 8pt !important; color: #555 !important; margin-top: 1px; font-style: italic; line-height: 1.1 !important;}
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px;}
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="panel-maximized">

        <!-- VISTA: ARCHIVIO (DATABASE) -->
        <div id="view-archive" class="view-section p-4 md:p-8">
            <div class="max-w-5xl mx-auto w-full">
                <div class="flex justify-between items-center mb-8 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-inner">
                    <div>

    <!-- AREA STAMPA -->
    <div id="print-area"></div>

<script>
    let archiveDB = JSON.parse(localStorage.getItem('driving_leader_studio_db')) || [];
    let currentDocMeta = { gen: {}, read: {} };
    let currentCsvData = { gen: [], read: [] };
    let rawInputBuffer = "";
    let allAulasExpanded = false;

    function navTo(viewId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${viewId}`).classList.add('active');

        if(viewId === 'archive') {
            const searchBar = document.getElementById('search-db');
            if(searchBar) searchBar.value = '';
            renderArchiveList();
        }
        
        document.querySelectorAll('.maximized-panel').forEach(p => {
            toggleMaximize(p.id);
        });
    }

    function toggleMaximize(panelId) {
        const panel = document.getElementById(panelId);
        const backdrop = document.getElementById('maximize-backdrop');
        const icon = panel.querySelector('.fa-expand, .fa-compress');
        
        if (panel.classList.contains('maximized-panel')) {
            panel.classList.remove('maximized-panel');
            backdrop.classList.remove('active');
            if(icon) { icon.classList.remove('fa-compress'); icon.classList.add('fa-expand'); }
            
            document.body.classList.remove('panel-maximized');
            document.body.appendChild(backdrop);
        } else {
            panel.parentElement.insertBefore(backdrop, panel);
            
            panel.classList.add('maximized-panel');
            backdrop.classList.add('active');
            if(icon) { icon.classList.remove('fa-expand'); icon.classList.add('fa-compress'); }
            
            document.body.classList.add('panel-maximized');
        }
    }

    document.getElementById('maximize-backdrop').addEventListener('click', () => {
        document.querySelectorAll('.maximized-panel').forEach(panel => {
            toggleMaximize(panel.id);
        });
    });

    // --- PARSER TEXT ---
    function processAndRender(rawText, prefix) {
        if (!rawText.includes('=== MAPPA TECNICA ===') || !rawText.includes('=== MATRICE QUIZ ===')) {
            alert("Attenzione: Il testo non contiene i delimitatori necessari (=== MAPPA TECNICA === e === MATRICE QUIZ ===).");
            return false;
        }

        const parts = rawText.split('=== MATRICE QUIZ ===');
        const mappaRaw = parts[0].replace('=== MAPPA TECNICA ===', '').trim();
        const matriceRaw = parts[1].trim();

        renderMappa(mappaRaw, prefix);
        renderMatrice(matriceRaw, prefix);
        return true;
    }

    function processDataFromInput() {
        const rawText = document.getElementById('raw-input').value;
        rawInputBuffer = rawText; 
        const success = processAndRender(rawText, 'gen');
        if (success) {
            document.getElementById('gen-results-area').classList.remove('hidden');
            document.getElementById('gen-results-area').classList.add('flex');
        }
    }

    // --- RENDER MAPPA TECNICA ---
    function renderMappa(text, prefix) {
        const lines = text.split('\n');
        let html = '';
        currentDocMeta[prefix] = { aula: "", obiettivo: "", argomento: "", tempo: "" }; 
        
        lines.forEach(line => {
            let l = line.trim();
            if(!l) return;

            if (l.toUpperCase().startsWith('AULA:')) {
                currentDocMeta[prefix].aula = l.substring(5).replace(/[\*\_]/g, '').trim();
            }
            else if (l.toUpperCase().startsWith('OBIETTIVO:')) {
                currentDocMeta[prefix].obiettivo = l.substring(10).replace(/[\*\_]/g, '').trim();
            }
            else if (l.toUpperCase().startsWith('ARGOMENTO:')) {
                currentDocMeta[prefix].argomento = l.substring(10).replace(/[\*\_]/g, '').trim();
            }
            else if (l.toUpperCase().startsWith('TEMPO STIMATO:')) {
                currentDocMeta[prefix].tempo = l.substring(14).replace(/[\*\_]/g, '').trim();
            }
            else if (l.toUpperCase().includes('IL SENSO PRATICO:')) {
                let pText = l.replace(/.*IL SENSO PRATICO:/i, '').trim();
                html += `<div class="incipit-globale"><i class="fa-solid fa-lightbulb mr-2"></i><strong>Il Senso Pratico</strong>${pText}</div>`;
            }
            else if (l.toUpperCase().includes('FASE')) {
                let title = l.replace(/[\*🛑\#]/g, '').trim();
                html += `<div class="fase-title">${title}</div>`;
            } 
            else if (l.toUpperCase().includes('OBIETTIVO PRATICO:')) {
                let pText = l.replace(/.*OBIETTIVO PRATICO:/i, '').trim();
                html += `<div class="incipit-fase"><i class="fa-solid fa-bullseye mr-2"></i>${pText}</div>`;
            }
            else if (l.toUpperCase().includes('PAGINA') && l.includes('➔')) {
                l = l.replace(/^\*\s*/, '').replace(/⚠️/g, ''); 
                
                let pageMatch = l.match(/PAGINA\s*\d+:/i);
                let badgeText = pageMatch ? pageMatch[0].replace(':', '') : "PAGINA";
                
                let remaining = pageMatch ? l.substring(l.indexOf(':') + 1).trim() : l.trim();
                
                let upperRemaining = remaining.toUpperCase();
                let trapIndex = upperRemaining.indexOf('TRAPPOLA');
                
                let mainText = remaining;
                let trapText = "";

                if(trapIndex !== -1) {
                    mainText = remaining.substring(0, trapIndex).trim();
                    let afterTrap = remaining.substring(trapIndex + 8).replace(/^[:\s]+/, '').trim();
                    trapText = "TRAPPOLA: " + afterTrap;
                }

                mainText = mainText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                trapText = trapText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                html += `
                    <div class="pagina-row">
                        <div class="pagina-badge">${badgeText}</div>
                        <div class="pagina-text">${mainText} ${trapText ? `<div class="pagina-trap">${trapText}</div>` : ''}</div>
                    </div>
                `;
            }
        });

        let headerHtml = '';
        if(currentDocMeta[prefix].aula || currentDocMeta[prefix].obiettivo || currentDocMeta[prefix].argomento) {
            headerHtml = `
                <div class="ui-header-box mb-6 p-4 bg-slate-900/60 rounded-xl border border-slate-700 shadow-inner flex justify-between items-start gap-4">
                    <div>
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1"><i class="fa-solid fa-school mr-1"></i> ${currentDocMeta[prefix].aula || 'Mappa di Regia'}</p>
                        <h2 class="text-xl font-black text-white mb-1 leading-tight">${currentDocMeta[prefix].obiettivo || ''}</h2>
                        <h3 class="text-base text-blue-400 font-medium italic">${currentDocMeta[prefix].argomento || ''}</h3>
                    </div>
                    ${currentDocMeta[prefix].tempo ? `<div class="bg-slate-800 text-yellow-400 font-mono font-bold px-3 py-1.5 rounded-lg text-sm border border-slate-700 shadow-md shrink-0 flex items-center"><i class="fa-regular fa-clock mr-2"></i> ${currentDocMeta[prefix].tempo}</div>` : ''}
                </div>
            `;
        }

        document.getElementById(`${prefix}-mappa-render`).innerHTML = headerHtml + html;
    }

    // --- RENDER MATRICE ---
    function renderMatrice(text, prefix) {
        const lines = text.split('\n');
        let html = '';
        currentCsvData[prefix] = []; 
        currentCsvData[prefix].push(["Radice Base", "Continuazione", "Frase Unita Completa", "Esito (V/F)", "Motivazione Tecnica"]);

        let currentMatriceVisual = ""; 
        let currentMatriceClean = "";  

        lines.forEach(line => {
            let l = line.trim();
            if(!l) return;

            let upperL = l.toUpperCase();
            
            let isContinuation = false;
            if (l.match(/^[\-\*\•\>—–]/) || l.match(/^\.\.\./)) {
                isContinuation = true; 
            } else if (l.includes('|') || upperL.includes('(V)') || upperL.includes('(F)') || upperL.includes(' VERO ') || upperL.includes(' FALSO ')) {
                isContinuation = true; 
            }

            if (!isContinuation) {
                currentMatriceVisual = l.replace(/[\[\]\*\#]/g, '').trim();
                currentMatriceClean = currentMatriceVisual.replace(/\.\.\.$/, '').trim();
                html += `<div class="matrice-title">${currentMatriceVisual}</div>`;
            } 
            else {
                let parts = l.split('|');
                let rawQuizText = parts[0].trim();
                let expText = parts[1] ? parts[1].trim() : "Nessuna spiegazione fornita.";

                let isVero = rawQuizText.toUpperCase().includes('(V)') || rawQuizText.toUpperCase().includes('VERO');
                let badgeHtml = isVero ? '<span class="v-badge">(V)</span>' : '<span class="f-badge">(F)</span>';
                
                let testoVisual = rawQuizText.replace(/^[\-\*\•\>—–]\s*/, '')
                                   .replace(/\(V\)/i, '')
                                   .replace(/\(F\)/i, '')
                                   .replace(/VERO/i, '')
                                   .replace(/FALSO/i, '')
                                   .trim();
                
                let testoClean = testoVisual.replace(/^\.\.\./, '').trim();
                let fraseCompleta = (currentMatriceClean + " " + testoClean).replace(/\s+/g, ' ');
                
                html += `<div class="matrice-row">
                            <i class="fa-solid fa-arrow-turn-up fa-rotate-90 text-slate-600 mr-3 mt-1 text-sm shrink-0"></i> 
                            <div>
                                <span class="block">${testoVisual} ${badgeHtml}</span>
                                <span class="matrice-exp"><i class="fa-solid fa-caret-right mr-1"></i>${expText}</span>
                            </div>
                         </div>`;
                
                let esitoClean = isVero ? "V" : "F";
                currentCsvData[prefix].push([currentMatriceClean, testoClean, fraseCompleta, esitoClean, expText]);
            }
        });

        document.getElementById(`${prefix}-matrice-render`).innerHTML = html;
    }

    // --- ARCHIVIO ---
    function saveToArchive() {
        const meta = currentDocMeta['gen'];
        if(!meta.aula && !meta.obiettivo && !meta.argomento) {
            alert("Impossibile salvare: Manca l'intestazione con i metadati (AULA, OBIETTIVO, ARGOMENTO) nel testo fornito dall'IA.");
            return;
        }

        const newItem = {
            id: 'doc_' + Date.now(),
            aula: meta.aula || "Varie",
            obiettivo: meta.obiettivo || "Generico",
            argomento: meta.argomento || "Senza Argomento",
            tempo: meta.tempo || "",
            rawText: rawInputBuffer,
            date: new Date().toLocaleDateString('it-IT')
        };

        const exists = archiveDB.find(doc => doc.argomento === newItem.argomento && doc.obiettivo === newItem.obiettivo);
        if(exists) {
            if(!confirm("Esiste già un documento con questo Argomento. Vuoi sovrascriverlo?")) return;
            archiveDB = archiveDB.filter(doc => doc.id !== exists.id); 
        }

        archiveDB.push(newItem);
        try {
            localStorage.setItem('driving_leader_studio_db', JSON.stringify(archiveDB));
            alert("Documento salvato con successo nell'Archivio Didattico!");
            navTo('archive');
        } catch (e) {
            alert("Errore di salvataggio. La memoria del browser potrebbe essere piena.");
        }
    }

    function deepSearch(doc, query) {
        if (!query) return true;
        const q = query.toLowerCase().trim();
        if (doc.aula.toLowerCase().includes(q)) return true;
        if (doc.obiettivo.toLowerCase().includes(q)) return true;
        if (doc.argomento.toLowerCase().includes(q)) return true;
        if (doc.rawText.toLowerCase().includes(q)) return true;
        return false;
    }

    function renderArchiveList(searchQuery = '') {
        const container = document.getElementById('archive-container');
        container.innerHTML = '';

        if(archiveDB.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-slate-500 italic"><i class="fa-solid fa-folder-open text-4xl mb-4 block text-slate-600"></i>Nessun documento salvato nell'archivio.</div>`;
            return;
        }

        const isSearching = searchQuery.trim().length > 0;
        const forceExpand = isSearching ? true : allAulasExpanded;
        let resultsFound = false;

        let grouped = {};
        
        archiveDB.forEach(doc => {
            if (!deepSearch(doc, searchQuery)) return;
            
            resultsFound = true;
            let aula = doc.aula || "Varie";
            let ob = doc.obiettivo || "Generico";
            
            if(!grouped[aula]) grouped[aula] = {};
            if(!grouped[aula][ob]) grouped[aula][ob] = [];
            grouped[aula][ob].push(doc);
        });

        if (isSearching && !resultsFound) {
            container.innerHTML = `
                <div class="text-center py-16 bg-slate-800/30 rounded-2xl border border-slate-700">
                    <i class="fa-solid fa-magnifying-glass text-5xl text-slate-500 mb-4"></i>
                    <h3 class="text-2xl font-bold text-white mb-2">Nessun risultato trovato</h3>
                    <p class="text-slate-400">La ricerca non ha prodotto risultati in nessun titolo, testo o quiz del database.</p>
                </div>
            `;
            return;
        }

        let aulaIndex = 0;

        Object.keys(grouped).sort().forEach(aulaName => {
            let aulaHtml = `<div class="mb-6 glass-panel overflow-hidden transition-all p-0 border border-slate-700">`;
            const gridClassHidden = forceExpand ? "" : "hidden";
            const iconClassToggle = forceExpand ? "fa-chevron-up" : "fa-chevron-down";
            
            aulaHtml += `
                <div class="p-6 cursor-pointer flex justify-between items-center hover:bg-slate-800/80 transition-colors"
                     onclick="document.getElementById('grid-aula-${aulaIndex}').classList.toggle('hidden'); 
                              document.getElementById('icon-aula-${aulaIndex}').classList.toggle('fa-chevron-up'); 
                              document.getElementById('icon-aula-${aulaIndex}').classList.toggle('fa-chevron-down');">
                    <h3 class="text-2xl font-black text-emerald-400 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-school mr-4"></i>${aulaName}
                    </h3>
                    <i id="icon-aula-${aulaIndex}" class="fa-solid ${iconClassToggle} text-slate-400 text-xl transition-transform"></i>
                </div>
                <div id="grid-aula-${aulaIndex}" class="space-y-4 p-6 pt-0 border-t border-slate-700/50 ${gridClassHidden}">
            `;
            
            Object.keys(grouped[aulaName]).sort().forEach(obName => {
                aulaHtml += `
                    <div class="bg-slate-800/40 rounded-xl border border-slate-700 overflow-hidden shadow-inner">
                        <div class="bg-slate-800/80 px-4 py-3 border-b border-slate-700 font-bold text-blue-400 flex items-center">
                            <i class="fa-solid fa-folder-open mr-2 text-sm"></i> ${obName}
                        </div>
                        <div class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                `;
                
                grouped[aulaName][obName].forEach(doc => {
                    let matchBadge = isSearching ? `<div class="absolute top-2 right-2 text-[9px] uppercase tracking-widest text-emerald-400 font-bold bg-emerald-900/30 px-1.5 py-0.5 rounded border border-emerald-500/30"><i class="fa-solid fa-check mr-1"></i> Trovato</div>` : '';
                    let timeBadge = doc.tempo ? `<span class="bg-slate-800 text-yellow-400 px-2 py-0.5 rounded text-[10px] font-mono ml-2 border border-slate-600"><i class="fa-regular fa-clock"></i> ${doc.tempo}</span>` : '';

                    aulaHtml += `
                        <div class="bg-slate-900 border border-slate-600 rounded-lg p-4 flex flex-col justify-between shadow hover:border-blue-500 transition group relative">
                            ${matchBadge}
                            <div class="cursor-pointer flex-grow mb-3" onclick="openArchivedDocument('${doc.id}')">
                                <h4 class="font-bold text-white text-base group-hover:text-blue-400 transition leading-snug pr-12">${doc.argomento}</h4>
                                <div class="flex items-center mt-2">
                                    <p class="text-xs text-slate-500"><i class="fa-regular fa-calendar mr-1"></i> ${doc.date}</p>
                                    ${timeBadge}
                                </div>
                            </div>
                            <div class="flex gap-2 mt-auto border-t border-slate-800 pt-3">
                                <button onclick="openArchivedDocument('${doc.id}')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 rounded transition">
                                    <i class="fa-solid fa-eye mr-1"></i> Apri
                                </button>
                                <button onclick="deleteArchivedDocument('${doc.id}')" class="bg-slate-800 hover:bg-red-600 text-slate-400 hover:text-white w-8 h-8 rounded transition flex items-center justify-center shrink-0 border border-slate-700 hover:border-red-500">
                                    <i class="fa-solid fa-trash text-xs"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
                aulaHtml += `</div></div>`;
            });
            aulaHtml += `</div></div>`;
            container.innerHTML += aulaHtml;
            aulaIndex++;
        });
    }

    function toggleAllAulas() {
        allAulasExpanded = !allAulasExpanded;
        const btn = document.getElementById('btn-toggle-aulas');
        
        if (allAulasExpanded) {
            btn.innerHTML = '<i class="fa-solid fa-compress mr-2"></i> <span>Chiudi Tutte</span>';
        } else {
            btn.innerHTML = '<i class="fa-solid fa-expand mr-2"></i> <span>Espandi Tutte</span>';
        }
        
        const currentQuery = document.getElementById('search-db') ? document.getElementById('search-db').value : '';
        renderArchiveList(currentQuery);
    }

    function openArchivedDocument(docId) {
        const doc = archiveDB.find(d => d.id === docId);
        if(!doc) return;

        document.getElementById('reader-aula-title').innerText = doc.aula;
        document.getElementById('reader-item-title').innerText = doc.argomento;

        processAndRender(doc.rawText, 'read');
        navTo('reader');
    }

    function deleteArchivedDocument(docId) {
        if(confirm("Vuoi eliminare definitivamente questo documento dall'archivio?")) {
            archiveDB = archiveDB.filter(d => d.id !== docId);
            localStorage.setItem('driving_leader_studio_db', JSON.stringify(archiveDB));
            renderArchiveList(document.getElementById('search-db').value);
        }
    }

    // --- DB IMPORT/EXPORT ---
    function exportArchiveDB() {
        if(archiveDB.length === 0) return alert("Il database è vuoto. Niente da esportare!");
        
        const dataStr = JSON.stringify(archiveDB, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = `Studio_Database_Backup_${new Date().toISOString().slice(0,10)}.json`;
        
        let linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
    }

    function importArchiveDB(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    if(confirm(`Trovati ${importedData.length} documenti nel backup. Vuoi unirli al tuo database esistente?`)) {
                        let merged = [...archiveDB];
                        importedData.forEach(newDoc => {
                            if(!merged.find(d => d.id === newDoc.id)) merged.push(newDoc);
                        });
                        archiveDB = merged;
                        localStorage.setItem('driving_leader_studio_db', JSON.stringify(archiveDB));
                        renderArchiveList();
                        alert("Database importato con successo!");
                    }
                } else {
                    alert("Formato file non valido. Richiesto array JSON.");
                }
            } catch(err) {
                alert("Errore durante la lettura del file: " + err.message);
            }
            document.getElementById('import-file').value = ""; 
        };
        reader.readAsText(file);
    }

    // --- STAMPA PDF E CSV ---
    function printDocument(type, prefix) {
        const printArea = document.getElementById('print-area');
        const contentHtml = document.getElementById(`${prefix}-${type}-render`).innerHTML;
        const meta = currentDocMeta[prefix];
        
        let docTitle = type === 'mappa' ? 'Mappa di Regia Didattica' : 'Analisi Matriciale Quiz';

        let printHeader = `
            <div class="print-header-container">
                <p class="print-header-aula">${meta.aula || docTitle}</p>
                <h1 class="print-header-ob">${meta.obiettivo || 'Documento senza titolo'}</h1>
                <div style="display:flex; justify-content: space-between; align-items: baseline;">
                    <h2 class="print-header-arg">${meta.argomento || ''}</h2>
                    ${meta.tempo ? `<span style="font-size: 11pt; font-weight: bold; color: #555;"><i class="fa-regular fa-clock"></i> ${meta.tempo}</span>` : ''}
                </div>
            </div>
        `;
        
        printArea.innerHTML = printHeader + contentHtml;
        window.print();
    }

    function exportCSV(prefix) {
        const csvArray = currentCsvData[prefix];
        if(!csvArray || csvArray.length <= 1) return alert("Nessun dato matrice disponibile per l'esportazione.");

        let csvContent = "";
        csvArray.forEach(row => {
            let rowStr = row.map(item => {
                let str = String(item).replace(/"/g, '""');
                return `"${str}"`;
            }).join(",");
            csvContent += rowStr + "\r\n";
        });

        const meta = currentDocMeta[prefix];
        const safeName = (meta.argomento || "Matrici").replace(/[^a-z0-9]/gi, '_').toLowerCase();

        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Export_${safeName}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    if(archiveDB.length === 0) {
        navTo('generator');
    } else {
        navTo('archive');
    }
</script>
