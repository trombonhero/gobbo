<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tablet Director - Driving Leader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .view { display: none; height: 100%; flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Aree Upload per Tablet */
        #drop-zone {
            border: 3px dashed #3b82f6; border-radius: 1.5rem; background: #1e293b;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 45vh; margin-bottom: 1.5rem; cursor: pointer; transition: background 0.2s;
        }
        #drop-zone:active { background: #334155; }

        /* Card Contenuti (Regia) */
        .card-chiave { background: linear-gradient(145deg, #1e3a8a, #1e40af); border-left: 6px solid #60a5fa; }
        .card-regia { background: linear-gradient(145deg, #78350f, #92400e); border-left: 6px solid #fbbf24; }
        .card-quiz { background: linear-gradient(145deg, #7f1d1d, #991b1b); border-left: 6px solid #f87171; }

        .content-text { font-size: 1.4rem; line-height: 1.6; }
        .content-text strong { color: #ffffff; font-weight: 800; background-color: rgba(255,255,255,0.1); padding: 0 4px; border-radius: 4px;}
        
        /* Stili per le liste generate dal parser */
        .bullet-row { display: flex; align-items: flex-start; margin-bottom: 0.75rem; }
        .bullet-icon { margin-right: 0.75rem; margin-top: 0.4rem; opacity: 0.7; font-size: 0.8em; flex-shrink: 0; }

        /* Bottoni Navigazione Giganti */
        .nav-btn {
            flex: 1; padding: 1.5rem; font-size: 1.5rem; font-weight: 800; border: none; border-radius: 1rem;
            color: white; transition: transform 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:active { transform: scale(0.95); }
        .btn-prev { background-color: #334155; }
        .btn-next { background-color: #2563eb; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }

        /* Scrollbar nascosta per pulizia visiva */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- VISTA 0: LIBRERIA (HOME) -->
    <div id="view-library" class="view active h-full p-4 md:p-8">
        <!-- Header Libreria -->
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-extrabold text-blue-400 flex items-center"><i class="fa-solid fa-tablet-screen-button mr-4"></i>Pannello di Regia</h1>
                <p class="text-slate-400 mt-2 text-lg">Il tuo archivio moduli e copioni</p>
            </div>
            <button onclick="navTo('upload')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-8 rounded-2xl shadow-xl transition text-xl flex items-center active:scale-95">
                <i class="fa-solid fa-plus mr-3"></i> Nuovo Modulo
            </button>
        </div>
        
        <!-- Griglia dei moduli salvati -->
        <div id="library-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 overflow-y-auto pb-20 content-start">
            <!-- Le card verranno generate qui tramite JavaScript -->
        </div>
    </div>

    <!-- VISTA 1: CARICAMENTO NUOVO MODULO -->
    <div id="view-upload" class="view h-full p-4 md:p-8">
        <div class="flex items-center mb-8 border-b border-slate-800 pb-6">
            <button onclick="navTo('library')" class="text-slate-400 hover:text-white mr-6 text-2xl bg-slate-800 w-14 h-14 rounded-xl flex items-center justify-center transition active:scale-95"><i class="fa-solid fa-arrow-left"></i></button>
            <div>
                <h1 class="text-3xl font-extrabold text-white">Aggiungi al Database</h1>
                <p class="text-slate-400 mt-1">Trascina il file .txt o incolla il testo dell'IA</p>
            </div>
        </div>
        
        <input type="file" id="file-input" accept=".txt" class="hidden">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-hand-pointer text-7xl text-blue-500 mb-6"></i>
            <h3 class="text-3xl font-bold text-white mb-2">Tocca per scegliere il file</h3>
            <p class="text-slate-400 text-xl">oppure incolla qui sotto</p>
        </div>

        <!-- Opzione Incolla Testo -->
        <div class="flex gap-4 h-32">
            <textarea id="paste-area" class="w-full bg-slate-800 text-slate-300 p-4 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 text-lg" placeholder="...oppure INCOLLA direttamente il testo qui e premi Salva"></textarea>
            <button onclick="loadFromPaste()" class="bg-emerald-600 text-white font-bold rounded-xl px-6 text-xl shadow-lg active:scale-95 transition flex flex-col items-center justify-center gap-2 min-w-[120px]">
                <i class="fa-solid fa-save text-2xl"></i>
                <span class="text-sm">Salva</span>
            </button>
        </div>
        
        <div id="error-msg" class="mt-6 text-red-400 font-bold bg-red-900/20 px-6 py-4 rounded-xl border border-red-500/30 hidden flex items-center">
            <i class="fa-solid fa-triangle-exclamation text-2xl mr-4"></i>
            <span>Errore generico.</span>
        </div>
    </div>

    <!-- VISTA 2: IL GOBBO / REGIA -->
    <div id="view-director" class="view">
        <!-- Header -->
        <div class="bg-slate-900 p-4 flex justify-between items-center border-b border-slate-800 shadow-md z-20">
            <div class="flex-1 truncate pr-4">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest" id="mod-title">MODULO</p>
                <h2 class="text-2xl font-bold text-white truncate" id="slide-title">Titolo Slide</h2>
            </div>
            <div class="bg-blue-600 text-white font-mono font-bold px-4 py-2 rounded-lg text-xl shadow-inner shrink-0" id="slide-counter">
                1 / 5
            </div>
            <button onclick="navTo('library')" class="ml-4 bg-slate-800 p-3 rounded-lg text-slate-400 active:bg-slate-700"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <!-- Contenuto Scorrevole -->
        <div id="slide-content" class="flex-1 overflow-y-auto p-6 space-y-6 pb-32">
            <!-- Riempito via JS -->
        </div>

        <!-- Footer Bottoni (Fissi in basso) -->
        <div class="absolute bottom-0 left-0 w-full p-4 bg-slate-900/90 backdrop-blur border-t border-slate-800 flex gap-4 z-20 pb-6">
            <button onclick="prevSlide()" class="nav-btn btn-prev"><i class="fa-solid fa-chevron-left mr-3"></i> Prec</button>
            <button onclick="nextSlide()" class="nav-btn btn-next">Avanti <i class="fa-solid fa-chevron-right ml-3"></i></button>
        </div>
    </div>

<script>
    // --- GESTIONE DATABASE LOCALE ---
    let savedModules = JSON.parse(localStorage.getItem('tablet_director_db_v2')) || [];

    let appData = {
        moduloTitle: "",
        slides: [],
        currentIndex: 0
    };

    function navTo(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        
        if(viewId === 'library') {
            renderLibrary();
        }
        if(viewId === 'upload') {
            document.getElementById('file-input').value = "";
            document.getElementById('paste-area').value = "";
            document.getElementById('error-msg').classList.add('hidden');
        }
    }

    // --- RENDERING DELLA LIBRERIA ---
    function renderLibrary() {
        const container = document.getElementById('library-container');
        container.innerHTML = '';
        
        if (savedModules.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-500 text-xl italic"><i class="fa-solid fa-folder-open text-4xl mb-4 block"></i>Nessun copione salvato.<br>Tocca "Nuovo Modulo" per iniziare.</div>`;
            return;
        }
        
        [...savedModules].reverse().forEach(mod => {
            const card = document.createElement('div');
            card.className = 'bg-slate-800/80 border border-slate-700 rounded-2xl p-6 flex flex-col shadow-lg relative';
            card.innerHTML = `
                <div class="flex-grow">
                    <h3 class="text-2xl font-bold text-white mb-3 leading-tight">${mod.moduloTitle || "Modulo senza titolo"}</h3>
                    <p class="text-slate-400 font-mono text-sm"><i class="fa-solid fa-layer-group text-blue-400 mr-2"></i>${mod.slides.length} Slide configurate</p>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="startModule('${mod.id}')" class="flex-grow bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition shadow flex items-center justify-center text-lg active:scale-95">
                        <i class="fa-solid fa-play mr-2"></i> Avvia
                    </button>
                    <button onclick="deleteModule('${mod.id}')" class="bg-slate-900 hover:bg-red-600 text-red-500 hover:text-white border border-slate-700 hover:border-red-500 font-bold py-3 px-5 rounded-xl transition shadow flex items-center justify-center active:scale-95">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // --- AZIONI SUI MODULI ---
    function startModule(id) {
        const mod = savedModules.find(m => m.id === id);
        if(mod) {
            appData.moduloTitle = mod.moduloTitle;
            appData.slides = mod.slides;
            appData.currentIndex = 0;
            renderSlide();
            navTo('director');
        }
    }

    function deleteModule(id) {
        if(confirm("Vuoi davvero eliminare questo modulo dall'archivio? L'operazione è irreversibile.")) {
            savedModules = savedModules.filter(m => m.id !== id);
            try {
                localStorage.setItem('tablet_director_db_v2', JSON.stringify(savedModules));
            } catch(e) {}
            renderLibrary();
        }
    }

    // --- LETTURA E PARSING DATI ---
    document.getElementById('file-input').addEventListener('change', function(e) {
        if(e.target.files.length === 0) return;
        const reader = new FileReader();
        reader.onload = function(evt) { processContent(evt.target.result); };
        reader.readAsText(e.target.files[0]);
    });

    function loadFromPaste() {
        const txt = document.getElementById('paste-area').value;
        if(txt.trim().length > 10) processContent(txt);
        else showError("Incolla del testo valido!");
    }

    function showError(msg) {
        const errorEl = document.getElementById('error-msg');
        errorEl.querySelector('span').innerText = msg;
        errorEl.classList.remove('hidden');
    }

    // Funzione che formatta le righe come HTML
    function formatContentLine(line) {
        let clean = line.trim();
        if (!clean) return "<div class='h-2'></div>"; 
        
        if (clean.startsWith('-')) {
            let text = clean.substring(1).trim();
            return `<div class="bullet-row"><i class="fa-solid fa-circle bullet-icon"></i><span>${text}</span></div>`;
        } else {
            return `<div class="mb-2">${clean}</div>`;
        }
    }

    // Parser Estremamente Tollerante (Antiproiettile per Regex AI)
    function processContent(txt) {
        let parsedData = {
            id: 'mod_' + Date.now(),
            moduloTitle: "Nuova Lezione " + new Date().toLocaleDateString(),
            slides: []
        };
        
        let lines = txt.split('\n');
        let currentSlide = null;

        // Controllo validità strutturale generica prima di scansionare
        let checkContent = txt.replace(/\*/g, '');
        if (!/[-]+\s*SLIDE/i.test(checkContent)) {
            showError("Errore Struttura: Il file non contiene il tag '--- SLIDE:'. Assicurati di aver incollato il testo generato dal Master Prompt.");
            return;
        }

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            
            // Ignoriamo le righe di codice markdown dell'IA (es. ```text)
            if (line.startsWith('```')) continue;
            
            // Pulisce asterischi errati sui tag che l'IA aggiunge a caso
            let cleanLine = line.replace(/^\*+/, '').replace(/\*+$/, '').trim();
            let uLine = cleanLine.toUpperCase();

            // Ignora tag iniziali dell'IA
            if (uLine.includes('[INIZIO TESTO]') || uLine.includes('[FINE TESTO]')) continue;

            // Intercetta Modulo
            if (uLine.includes('MODULO:')) {
                parsedData.moduloTitle = cleanLine.substring(cleanLine.indexOf(':') + 1).trim();
            }
            // Intercetta Slide (SUPER TOLLERANTE contro l'aggiunta di numeri o assenza dei due punti)
            else if (uLine.match(/^[-]+\s*SLIDE/)) {
                let colonIdx = cleanLine.indexOf(':');
                let slideTitle = "";
                if (colonIdx !== -1) {
                    slideTitle = cleanLine.substring(colonIdx + 1).trim();
                } else {
                    slideTitle = cleanLine.replace(/^[-]+\s*SLIDE\s*[0-9]*/i, '').replace(/^[-]+/, '').trim();
                }
                
                currentSlide = {
                    title: slideTitle || "Slide " + (parsedData.slides.length + 1),
                    frase: "", regia: "", focus: "", currentSection: null
                };
                parsedData.slides.push(currentSlide);
            }
            else if (currentSlide) {
                // Tollerante se l'IA aggiunge spazi, manca due punti o usa l'emoji sbagliata
                if (uLine.includes('FRASE CHIAVE')) {
                    currentSlide.currentSection = 'frase';
                    let colonIdx = cleanLine.indexOf(':');
                    let content = colonIdx > -1 ? cleanLine.substring(colonIdx + 1).trim() : cleanLine.replace(/.*FRASE CHIAVE/i, '').replace(/^[^a-zA-Z0-9]+/, '').trim();
                    if(content) currentSlide.frase += formatContentLine(content);
                }
                else if (uLine.includes('REGIA')) {
                    currentSlide.currentSection = 'regia';
                    let colonIdx = cleanLine.indexOf(':');
                    let content = colonIdx > -1 ? cleanLine.substring(colonIdx + 1).trim() : cleanLine.replace(/.*REGIA/i, '').replace(/^[^a-zA-Z0-9]+/, '').trim();
                    if(content) currentSlide.regia += formatContentLine(content);
                }
                else if (uLine.includes('FOCUS QUIZ') || (uLine.includes('FOCUS') && uLine.includes('🎯'))) {
                    currentSlide.currentSection = 'focus';
                    let colonIdx = cleanLine.indexOf(':');
                    let content = colonIdx > -1 ? cleanLine.substring(colonIdx + 1).trim() : cleanLine.replace(/.*FOCUS(?: QUIZ)?/i, '').replace(/^[^a-zA-Z0-9]+/, '').trim();
                    if(content) currentSlide.focus += formatContentLine(content);
                }
                // Continua a concatenare le righe successive alla sezione attiva (usato specialmente per i Focus Quiz a elenco)
                else if (currentSlide.currentSection) {
                    currentSlide[currentSlide.currentSection] += formatContentLine(line);
                }
            }
        }

        if(parsedData.slides.length > 0) {
            savedModules.push(parsedData);
            try {
                localStorage.setItem('tablet_director_db_v2', JSON.stringify(savedModules));
            } catch(e) {
                alert("Attenzione: Memoria piena.");
            }
            navTo('library');
        } else {
            showError("Errore di lettura. Assicurati che il testo contenga i tag strutturali corretti.");
        }
    }

    // Formattatore Grassetto
    function formatBold(text) {
        if(!text) return "";
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // --- REGIA (SLIDE RENDERER) ---
    function renderSlide() {
        const slide = appData.slides[appData.currentIndex];
        document.getElementById('mod-title').innerText = appData.moduloTitle || "LEZIONE IN CORSO";
        document.getElementById('slide-title').innerText = slide.title;
        document.getElementById('slide-counter').innerText = `${appData.currentIndex + 1} / ${appData.slides.length}`;
        
        const contentDiv = document.getElementById('slide-content');
        contentDiv.innerHTML = '';
        contentDiv.scrollTop = 0;

        if(slide.frase) {
            contentDiv.innerHTML += `
                <div class="card-chiave p-5 rounded-2xl shadow-lg">
                    <div class="flex items-center text-blue-300 font-bold tracking-widest text-sm mb-3 uppercase">
                        <i class="fa-solid fa-key mr-2 text-lg"></i> Il Succo (Frase Chiave)
                    </div>
                    <div class="content-text text-blue-50">${formatBold(slide.frase)}</div>
                </div>
            `;
        }

        if(slide.regia) {
            contentDiv.innerHTML += `
                <div class="card-regia p-5 rounded-2xl shadow-lg">
                    <div class="flex items-center text-yellow-400 font-bold tracking-widest text-sm mb-3 uppercase">
                        <i class="fa-solid fa-clapperboard mr-2 text-lg"></i> La Regia (Metafore ed Esempi)
                    </div>
                    <div class="content-text text-orange-50">${formatBold(slide.regia)}</div>
                </div>
            `;
        }

        if(slide.focus) {
            contentDiv.innerHTML += `
                <div class="card-quiz p-5 rounded-2xl shadow-lg">
                    <div class="flex items-center text-red-300 font-bold tracking-widest text-sm mb-3 uppercase">
                        <i class="fa-solid fa-crosshairs mr-2 text-lg"></i> Trabocchetti dei Quiz
                    </div>
                    <div class="content-text text-red-50">${formatBold(slide.focus)}</div>
                </div>
            `;
        }
    }

    function nextSlide() {
        if (appData.currentIndex < appData.slides.length - 1) {
            appData.currentIndex++;
            renderSlide();
        }
    }

    function prevSlide() {
        if (appData.currentIndex > 0) {
            appData.currentIndex--;
            renderSlide();
        }
    }

    // --- GESTIONE SWIPE PER TABLET ---
    let touchstartX = 0;
    let touchendX = 0;
    
    document.getElementById('view-director').addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
    });

    document.getElementById('view-director').addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleSwipe();
    });

    function handleSwipe() {
        const threshold = 70;
        if (touchendX < touchstartX - threshold) {
            nextSlide();
        }
        if (touchendX > touchstartX + threshold) {
            prevSlide();
        }
    }

    // Inizializza mostrando la libreria
    navTo('library');
</script>
</body>
</html>
